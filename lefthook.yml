pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,cjs,mjs}'
      run: yarn oxlint --fix {staged_files}
      stage_fixed: true
    - name: format
      glob: '*.{js,cjs,mjs,json,md}'
      run: yarn oxfmt {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: test
      run: yarn vitest run
